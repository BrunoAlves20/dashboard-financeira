<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
  <div class="max-w-md w-full space-y-8 bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
    
    <!-- Header -->
    <div class="text-center">
      <div class="mx-auto h-12 w-12 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
        <span class="text-2xl font-bold text-white">$</span>
      </div>
      <h2 class="mt-6 text-3xl font-extrabold text-white tracking-tight">Criar Nova Conta</h2>
    </div>

    <!-- Mensagem de Erro da API -->
    <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl text-sm text-center">
      {{ errorMessage }}
    </div>

    <!-- Formulário Conectado ao Angular -->
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
      <div class="space-y-4">
        
        <!-- Campo Nome -->
        <div>
          <label class="text-sm font-medium text-slate-300 block mb-2">Nome Completo</label>
          <input formControlName="name" type="text"
            class="w-full px-4 py-3 bg-slate-950 border rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all duration-200"
            [ngClass]="f['name'].touched && f['name'].errors ? 'border-red-500' : 'border-slate-800'"
            placeholder="Seu nome completo">
          <span *ngIf="f['name'].touched && f['name'].errors?.['required']" class="text-xs text-red-400 mt-1 block">O nome é obrigatório.</span>
        </div>

        <!-- Campo Email -->
        <div>
          <label class="text-sm font-medium text-slate-300 block mb-2">E-mail</label>
          <input formControlName="email" type="email"
            class="w-full px-4 py-3 bg-slate-950 border rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all duration-200"
            [ngClass]="f['email'].touched && f['email'].errors ? 'border-red-500' : 'border-slate-800'"
            placeholder="seu@email.com">
          <span *ngIf="f['email'].touched && f['email'].errors?.['email']" class="text-xs text-red-400 mt-1 block">Insira um e-mail válido.</span>
        </div>

        <!-- Campo Senha -->
        <div>
          <label class="text-sm font-medium text-slate-300 block mb-2">Senha</label>
          <div class="relative flex items-center">
            <!-- O type do input agora é dinâmico com base na nossa variável -->
            <input formControlName="password" [type]="showPassword ? 'text' : 'password'"
              class="w-full pl-4 pr-12 py-3 bg-slate-950 border rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all duration-200"
              [ngClass]="f['password'].touched && f['password'].errors ? 'border-red-500' : 'border-slate-800'"
              placeholder="••••••••">
            
            <!-- Botão do Olho com ícones SVG puros (sem precisar instalar bibliotecas extras) -->
            <button type="button" (click)="togglePasswordVisibility()"
              class="absolute right-4 text-slate-400 hover:text-slate-200 transition-colors focus:outline-none">
              @if (showPassword) {
                <!-- Ícone: Olho Aberto -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              } @else {
                <!-- Ícone: Olho Fechado -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              }
            </button>
          </div>
          
          <!-- Indicador de Senha Forte (Exigência de UX) -->
          <div class="mt-2 flex items-center gap-2">
            <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
              <!-- A largura e a cor agora mudam sozinhas baseadas na quantidade de caracteres -->
              <div class="h-full transition-all duration-300"
                [ngClass]="getPasswordStrengthWidth()">
              </div>
            </div>
            
            <span class="text-xs min-w-[80px] text-right font-medium"
              [ngClass]="{
                'text-red-400': getPasswordStrengthText() === 'Senha Fraca',
                'text-amber-400': getPasswordStrengthText() === 'Senha Média',
                'text-emerald-400': getPasswordStrengthText() === 'Senha Forte'
              }">
              {{ getPasswordStrengthText() }}
            </span>
          </div>
          <p class="text-[11px] text-slate-500 mt-1">A senha deve ter no mínimo 6 dígitos, incluindo uma letra e um número.</p>
        </div>
      </div>

      <!-- Botão Cadastrar -->
      <div>
        <button type="submit" [disabled]="loading"
          class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl transition-all duration-200 shadow-lg shadow-indigo-600/20 disabled:opacity-50">
          {{ loading ? 'Criando conta...' : 'Criar minha conta' }}
        </button>
      </div>
    </form>

    <!-- Link para Login -->
    <div class="text-center mt-4">
      <p class="text-sm text-slate-400">
        Já possui uma conta? <a routerLink="/login" class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors duration-200">Fazer Login</a>
      </p>
    </div>

  </div>
</div>
